}

function renderCompare(){
  const p=P.find(x=>x.id===S.cmpProd);
  const rows=V.filter(v=>PR[p.id]&&PR[p.id][v.id]!==undefined&&v.dist<=S.radius)
    .map(v=>({...v,price:PR[p.id][v.id]}))
    .sort((a,b)=>a.price-b.price);
  const min=rows.length?rows[0].price:0;
  const max=rows.length?rows[rows.length-1].price:0;
  const saving=max-min;
  return `
<div class="back-row" onclick="goBack()"><span class="back-ico">←</span><span class="back-title">Compare prices</span></div>
<div style="padding:16px">
  <select class="compare-select" onchange="upCmp(parseInt(this.value))">
    ${P.map(pd=>`<option value="${pd.id}" ${pd.id===S.cmpProd?'selected':''}>${pd.name}</option>`).join('')}
  </select>
  ${saving>0?`<div class="savings-banner"><div><div class="sav-text">Best deal nearby 🏆</div><div class="sav-sub">${rows[0]?.name}</div></div><div class="sav-amt">Save ₹${saving}</div></div>`:''}
  <div class="compare-tab">
    <div class="compare-hd"><span>${p.name} — price per ${p.unit}</span><span style="opacity:.75;font-size:11px">${rows.length} shops nearby</span></div>
    ${rows.length===0?`<div style="padding:20px;text-align:center;color:#aaa;font-size:13px">No vendors in ${S.radius}km radius</div>`:rows.map((v,i)=>`
    <div class="compare-row ${v.price===min?'best':''}">
      <div>
        <div class="cshop">${v.emoji} ${v.name} ${v.price===min?'🏆':''}</div>
        <div class="cdist">${v.dist}km away • ⭐ ${v.rating} • Trust ${v.trust}%</div>
      </div>
      <div style="text-align:right">
        <div class="cprice ${v.price===max&&rows.length>1?'high':''}">₹${v.price}</div>
        ${v.price===min&&rows.length>1?`<div style="font-size:10px;color:#0F6E56;font-weight:600">Cheapest</div>`:''}
      </div>
    </div>`).join('')}
  </div>
  <div style="padding:10px 14px;background:#F8F8F8;border-radius:12px;font-size:12px;color:#888;text-align:center">Prices crowd-sourced & IoT-verified · Updated frequently</div>
</div>`;
}

  <div style="padding:16px">
    <div class="admin-metrics">
      <div class="am-box"><div class="am-val">${V.length}</div><div class="am-lbl">Total vendors</div><span class="am-badge" style="background:#E1F5EE;color:#0F6E56">+${S.pending.length} pending</span></div>
      <div class="am-box"><div class="am-val" style="color:#0F6E56">${active}</div><div class="am-lbl">Open now</div><span class="am-badge" style="background:#FDECED;color:#E23744">${V.length-active} closed</span></div>
      <div class="am-box"><div class="am-val" style="color:#185FA5">${iotOn}</div><div class="am-lbl">IoT online</div><span class="am-badge" style="background:#E6F1FB;color:#185FA5">of ${Object.keys(S.iotLive).length} devices</span></div>

function bindEvents(){}
function upQ(q){S.q=q;render()}
function upR(r){S.radius=parseInt(r);render()}
function upCat(c){S.cat=c;render()}
function upSort(s){S.sort=s;render()}
function goCompare(){S.page='compare';render()}
function goBack(){S.page='home';S.vid=null;render()}
function openShop(id){
  S.vid=id;S.page='shop';S.rating=0;
  if(!S.recent.includes(id)){S.recent.unshift(id);if(S.recent.length>4)S.recent.pop();}
  V.find(v=>v.id===id).views++;
  render();
}
function upCmp(id){S.cmpProd=id;render()}
function togFav(id){
  S.favs=S.favs.includes(id)?S.favs.filter(x=>x!==id):[...S.favs,id];
  render();
}
function setRat(r){S.rating=r;render()}
function postReview(vid){
  const inp=document.getElementById('rev-inp');
  if(!inp||!inp.value.trim()||!S.rating) return;
  S.reviews.push({vid,user:"You",r:S.rating,text:inp.value.trim(),date:"just now"});
  S.rating=0;render();
}
function doSync(){
  const btn=document.getElementById('sbtn');
  const sub=document.getElementById('dev-sub');
  if(btn){btn.textContent='Syncing...';btn.style.background='#aaa';}
  setTimeout(()=>{
    if(btn){btn.textContent='⟳ Sync Now';btn.style.background='#E23744';}
    if(sub) sub.textContent='Last seen: just now';
  },1500);
}
function updP(pid){
  const inp=document.getElementById('p'+pid);
  if(!inp) return;
  const val=parseFloat(inp.value);
  if(!isNaN(val)&&val>0){myPrices[pid]=val;PR[pid][1]=val;}
  render();
}
function togVendor(id){const v=V.find(x=>x.id===id);if(v)v.status=v.status==='open'?'closed':'open';render()}
function togIoT(id){S.iotLive[id]=!S.iotLive[id];const v=V.find(x=>x.id===id);if(v)v.status=S.iotLive[id]?'open':'closed';render()}
function approve(id){S.pending=S.pending.filter(v=>v.id!==id);render()}
function reject(id){S.pending=S.pending.filter(v=>v.id!==id);render()}
render();
</script>
